---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: mfs-silverblue
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:    
  - type: files
    files:
      - source: system/common
        destination: / # copies files/system/common/* (* means everything inside it) into your image's root folder /

  - type: files
    files:
      - source: system/silverblue
        destination: / # copies files/system/silverblue/* (* means everything inside it) into your image's root folder /

  - type: copy
    from: docker.io/creativeprojects/resticprofile:latest
    src: /usr/bin/resticprofile
    dest: /usr/bin/

  - type: bling
    install:
      - 1password

  - type: dnf
    repos:
      copr:
        - atim/starship
      files:
        - https://packages.microsoft.com/yumrepos/vscode/config.repo
    install:
      packages:
        - starship
        - gnome-shell-extension-gsconnect
        - gnome-tweaks
        - baobab
        - fish
        - podman-compose
        - setroubleshoot-server
        - distrobox
        - code
        - bindfs
        - btrbk
        - et
        - gdb
        - intel-gpu-tools
        - ncdu
        - rclone
        - restic
        - yq
        - fd-find
        - gcc
        - zoxide
        - ripgrep
        - wireshark
        - flatpak-builder
        - tealdeer
        - virt-viewer
        - hcloud
        - chezmoi
        - p7zip
        - fzf
        - bat
        - fuse-sshfs
    remove:
      packages:
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - toolbox

  - type: script
    scripts:
      - install-fresh.sh
      - install-pixi.sh
      
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false # Send notification after install/uninstall is finished (true/false)
        install:
          - org.mozilla.firefox
          - com.google.Chrome
          - io.missioncenter.MissionCenter
          - org.gnome.Loupe
          - org.gnome.Showtime
          - org.gimp.GIMP
          - org.inkscape.Inkscape
          - org.gnome.TextEditor
          - org.gnome.Calculator
          - org.gnome.Papers
          - com.mattjakeman.ExtensionManager
          - io.github.flattool.Warehouse
          - org.gnome.Boxes
          - org.libreoffice.LibreOffice
      - scope: user
        notify: false
        repo:
          url: https://flathub.org/beta-repo/flathub-beta.flatpakrepo
          name: flathub-beta
          title: Flathub Beta

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - SourceCodePro
      google-fonts:
        - Open Sans

  - type: justfiles
    validate: true
    
  - type: gnome-extensions
    install:
      - AppIndicator and KStatusNotifierItem Support
      - Clipboard History
      - Bilingual App Search
      - Dash to Panel
      - Just Perfection
      - Night Theme Switcher

  - type: signing # this sets up the proper policy & signing files for signed images to work fully

